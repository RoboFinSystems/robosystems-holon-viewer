Description: RoboSystems Holon Viewer - S3 + CloudFront CDN

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
    Description: Environment name (prod or staging)

  Namespace:
    Type: String
    Default: ''
    Description: >-
      S3 bucket namespace (typically the AWS account ID) for globally unique
      bucket names. When provided: robosystems-holon-viewer-{namespace}-{env}-static-assets.
      When empty: robosystems-holon-viewer-{env}-static-assets.

  ServiceTag:
    Type: String
    Default: HolonViewer
    Description: Tag value for Service identification

  ComponentTag:
    Type: String
    Default: Viewer
    Description: Tag value for Component identification

  DomainName:
    Type: String
    Default: ''
    Description: >-
      Optional custom domain (e.g. viewer.robosystems.ai). Blank serves on the
      default CloudFront domain with no ACM cert and no Route53 record.

  HostedZoneId:
    Type: String
    Default: ''
    Description: Route53 hosted zone ID for DomainName (required when DomainName is set).

Conditions:
  HasNamespace: !Not [!Equals [!Ref Namespace, '']]
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  # ── Private S3 bucket (origin) ──────────────────────────────────────────────
  StaticAssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - HasNamespace
        - !Sub robosystems-holon-viewer-${Namespace}-${Environment}-static-assets
        - !Sub robosystems-holon-viewer-${Environment}-static-assets
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # ── CloudFront Origin Access Control (signs requests to the private bucket) ──
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub robosystems-holon-viewer-${Environment}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── ACM certificate for the custom domain (conditional; us-east-1; DNS-validated) ──
  # With HostedZoneId set, CloudFormation auto-creates the DNS validation records
  # and waits for issuance. The stack must be deployed in us-east-1 (CloudFront).
  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag

  # ── CloudFront distribution ─────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub Holon Viewer ${Environment} Distribution
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100 # North America + Europe (cost-optimized)
        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
          - !Ref AWS::NoValue
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticAssetsBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # Managed "CachingOptimized" cache policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # The viewer is a single-page app; serve index.html for any unmatched
        # path (and for the 403 OAC returns on missing keys) so it never 404s.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref SiteCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag

  # ── Bucket policy: only this CloudFront distribution may read objects ────────
  StaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticAssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${StaticAssetsBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ── Route53 alias records for the custom domain (conditional; A + AAAA for IPv6) ──
  SiteDNSRecordA:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # CloudFront's fixed hosted zone id
        EvaluateTargetHealth: false

  SiteDNSRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  StaticAssetsBucketName:
    Description: S3 bucket for the static build output
    Value: !Ref StaticAssetsBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation)
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: CloudFront distribution domain name (the public URL)
    Value: !GetAtt CloudFrontDistribution.DomainName

  ViewerUrl:
    Description: The deployed viewer URL
    Value: !If
      - HasCustomDomain
      - !Sub https://${DomainName}
      - !Sub https://${CloudFrontDistribution.DomainName}
